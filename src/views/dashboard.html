<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>arbnb / Airbnb 配当管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f6fa;color:#333}
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 24px;background:#fff;border-bottom:1px solid #e1e4e8}
.top-bar h1{font-size:18px;font-weight:700;color:#d32f2f}
.top-bar h1 span{color:#555;font-weight:400}
.btn-logout{background:#f5f6fa;border:1px solid #d32f2f;color:#d32f2f;padding:6px 16px;border-radius:6px;cursor:pointer;font-size:14px}
.btn-logout:hover{background:#d32f2f;color:#fff}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;padding:20px 24px}
.stat-card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.stat-card .label{font-size:12px;color:#888;margin-bottom:6px}
.stat-card .value{font-size:26px;font-weight:700;color:#222}
.stat-card .sub{font-size:12px;color:#aaa;margin-top:4px}
.controls{display:flex;gap:10px;padding:0 24px 16px;flex-wrap:wrap}
.controls input{padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;flex:1;min-width:200px}
.controls select{padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px}
.btn-add{border:1px solid #d32f2f;color:#d32f2f;background:#fff;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:14px}
.btn-add:hover{background:#d32f2f;color:#fff}
.btn-scan{background:#e8e8e8;color:#555;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:14px}
.btn-scan:hover{background:#d0d0d0}
.table-wrap{padding:0 24px 24px}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08)}
th{background:#f8f9fa;text-align:left;padding:12px 16px;font-size:12px;color:#888;font-weight:600;border-bottom:2px solid #eee}
td{padding:12px 16px;font-size:14px;border-bottom:1px solid #f0f0f0}
th:nth-child(9),td:nth-child(9){min-width:200px;max-width:300px;white-space:normal;word-break:break-word}
tr:last-child td{border-bottom:none}
tr:hover{background:#fafafa}
.amount{font-variant-numeric:tabular-nums;font-weight:600}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:12px;background:#e8f5e9;color:#2e7d32}
#loading{text-align:center;padding:60px;font-size:18px;color:#888}
#empty{text-align:center;padding:60px;font-size:18px;color:#aaa;display:none}
</style>
</head>
<body>
<div class="top-bar">
  <h1>arbnb <span>/ Airbnb 配当管理</span></h1>
  <button class="btn-logout" onclick="logout()">ログアウト</button>
</div>
<div class="stats">
  <div class="stat-card"><div class="label">合計件数</div><div class="value" id="s-total">—</div><div class="sub" id="s-monthly-count"></div></div>
  <div class="stat-card"><div class="label">今月合計金額</div><div class="value" id="s-monthly">—</div><div class="sub">今月</div></div>
  <div class="stat-card"><div class="label">平均1泊金額</div><div class="value" id="s-avg">—</div><div class="sub">平均 1泊</div></div>
  <div class="stat-card"><div class="label">合計ゲスト数</div><div class="value" id="s-total-guests">—</div><div class="sub" id="s-avg-adults">平均 — 人/組</div></div>
</div>
<div class="controls">
  <input type="text" id="search" placeholder="ゲスト名 / リスティング名 / 予約コード">
  <select id="sort"><option value="payout_date_desc">支払日順（新しい順）</option><option value="payout_date_asc">支払日順（古い順）</option><option value="amount_desc">金額高い順</option><option value="amount_asc">金額低い順</option></select>
  <select id="filter"><option value="">すべて</option><option value="japan">日本</option><option value="china">中国</option><option value="korea">韓国</option><option value="other">その他</option></select>
  <button class="btn-add" onclick="openAdd()">＋手動追加</button>
  <button class="btn-scan" onclick="openScan()">Gmail取込</button>
  <button class="btn-scan" onclick="runScanGuests()">Guest数取得</button>
</div>
<div class="table-wrap">
  <div id="loading">読み込み中...</div>
  <div id="empty">データがありません</div>
  <table id="table" style="display:none">
    <thead><tr><th>ゲスト名</th><th>大人</th><th>子供</th><th>赤ん坊</th><th>合計</th><th>国籍</th><th>泊数</th><th>滞在期間</th><th>リスティング</th><th>予約コード</th><th>金額</th><th>支払日</th></tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>
<div id="add-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:12px;padding:24px;width:480px;max-width:90vw">
    <h3 style="margin-bottom:16px">手動追加</h3>
    <div style="display:grid;gap:12px">
      <input type="text" id="add-name" placeholder="ゲスト名" style="padding:10px;border:1px solid #ddd;border-radius:8px;width:100%">
      <input type="text" id="add-code" placeholder="予約コード" style="padding:10px;border:1px solid #ddd;border-radius:8px;width:100%">
      <input type="number" id="add-amount" placeholder="金額" style="padding:10px;border:1px solid #ddd;border-radius:8px;width:100%">
      <input type="date" id="add-date" style="padding:10px;border:1px solid #ddd;border-radius:8px;width:100%">
    </div>
    <div style="display:flex;gap:10px;margin-top:20px;justify-content:flex-end">
      <button onclick="document.getElementById('add-modal').style.display='none'" style="padding:8px 20px;border:1px solid #ddd;border-radius:8px;background:#f5f5f5;cursor:pointer">キャンセル</button>
      <button onclick="saveManual()" style="padding:8px 20px;border:none;border-radius:8px;background:#d32f2f;color:#fff;cursor:pointer">保存</button>
    </div>
  </div>
</div>
<div id="scan-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:12px;padding:24px;width:400px;max-width:90vw;text-align:center">
    <h3 style="margin-bottom:12px">Gmail取込</h3>
    <p id="scan-status" style="color:#666;margin-bottom:16px">スキャン中...</p>
    <button onclick="document.getElementById('scan-modal').style.display='none';location.reload()" style="padding:8px 20px;border:none;border-radius:8px;background:#d32f2f;color:#fff;cursor:pointer">完了</button>
  </div>
</div>
<script>
(function() {
  var authHeader = 'Bearer ' + (localStorage.getItem('arbnb_token') || '');

  function api(path, opts) {
    return fetch(path, Object.assign({headers: {'Authorization': authHeader}}, opts || {}));
  }

  function esc(s) {
    if (s == null) return '';
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function fmtYen(v) {
    if (v == null || v === '') return '—';
    return '\u00a5' + Number(v).toLocaleString('ja-JP');
  }

  function fmtDate(d) {
    if (!d) return '—';
    return new Date(d).toLocaleDateString('ja-JP', {year:'numeric', month:'2-digit', day:'2-digit'});
  }

  function fmtStay(s, e) {
    var fmt = function(d) { return d ? new Date(d).toLocaleDateString('ja-JP', {month:'2-digit', day:'2-digit'}) : '?'; };
    return fmt(s) + ' → ' + fmt(e);
  }

  function render(data) {
    var html = '';
    data.forEach(function(p) {
      html += '<tr>' +
        '<td>' + esc(p.guest_name || '') + '</td>' +
        '<td>' + (p.guests_adult || '-') + '</td>' +
        '<td>' + (p.guests_child || '-') + '</td>' +
        '<td>' + (p.guests_infant || '-') + '</td>' +
        '<td>' + (p.guests_total || '-') + '</td>' +
        '<td><span class="badge">' + esc(p.nationality || '') + '</span></td>' +
        '<td>' + (p.nights || '-') + '</td>' +
        '<td><small>' + fmtStay(p.stay_start, p.stay_end) + '</small></td>' +
        '<td>' + esc(p.listing_title || '') + '</td>' +
        '<td><code>' + esc(p.reservation_code || '') + '</code></td>' +
        '<td class="amount">' + fmtYen(p.amount_value) + '</td>' +
        '<td><small>' + fmtDate(p.payout_date) + '</small></td>' +
        '</tr>';
    });
    document.getElementById('tbody').innerHTML = html;
  }

  function updateStats(data) {
    var total = data.length;
    var totalAmount = data.reduce(function(s, p) { return s + (p.amount_value || 0); }, 0);
    var totalNights = data.reduce(function(s, p) { return s + (p.nights || 0); }, 0);
    var totalGuests = data.reduce(function(s, p) { return s + (p.guests_total || 0); }, 0);
    document.getElementById('s-total').textContent = total;
    document.getElementById('s-monthly').textContent = fmtYen(totalAmount);
    document.getElementById('s-monthly-count').textContent = '今月 ' + total + ' 件';
    document.getElementById('s-avg').textContent = total > 0 ? '平均 ' + fmtYen(Math.round(totalAmount / total)) + ' /泊' : '平均 — /泊';
    document.getElementById('s-total-guests').textContent = totalGuests;
    document.getElementById('s-avg-adults').textContent = total > 0 ? '平均 ' + (totalGuests / total).toFixed(1) + ' 人/組' : '平均 — 人/組';
  }

  function load() {
    var search = document.getElementById('search').value.trim();
    var sort = document.getElementById('sort').value;
    var filter = document.getElementById('filter').value;
    var url = '/arbnb/api/payouts?limit=500';
    if (search) url += '&search=' + encodeURIComponent(search);
    if (sort) url += '&sort=' + encodeURIComponent(sort);
    if (filter) url += '&filter=' + encodeURIComponent(filter);

    document.getElementById('loading').style.display = 'block';
    document.getElementById('table').style.display = 'none';
    document.getElementById('empty').style.display = 'none';

    api(url).then(function(res) {
      if (!res.ok) throw new Error('API ' + res.status);
      return res.json();
    }).then(function(data) {
      document.getElementById('loading').style.display = 'none';
      if (!data.payouts || data.payouts.length === 0) {
        document.getElementById('empty').style.display = 'block';
        updateStats([]);
        return;
      }
      document.getElementById('table').style.display = 'table';
      render(data.payouts);
      updateStats(data.payouts);
    }).catch(function(err) {
      document.getElementById('loading').innerText = 'エラー: ' + err.message;
      console.error('load error:', err);
    });
  }

  function setSort(sort) {
    document.getElementById('sort').value = sort;
    load();
  }

  function debouncedLoad() {
    clearTimeout(window._debounceTimer);
    window._debounceTimer = setTimeout(load, 400);
  }

  function openAdd() {
    document.getElementById('add-modal').style.display = 'flex';
  }

  function openScan() {
    document.getElementById('scan-modal').style.display = 'flex';
    document.getElementById('scan-status').textContent = 'スキャン中...';
    api('/api/scan').then(function(r) { return r.json(); }).then(function(d) {
      document.getElementById('scan-status').textContent = '完了: ' + (d.saved || 0) + ' 件取得';
    }).catch(function(e) {
      document.getElementById('scan-status').textContent = 'エラー: ' + e.message;
    });
  }

  function runScanGuests() {
    var btn = event.target;
    btn.textContent = '処理中...';
    btn.disabled = true;
    api('/api/scan-reminders').then(function(r) { return r.json(); }).then(function(d) {
      btn.textContent = 'Guest数取得';
      btn.disabled = false;
      load();
    }).catch(function(e) {
      btn.textContent = 'エラー';
      setTimeout(function() { btn.textContent = 'Guest数取得'; btn.disabled = false; }, 2000);
    });
  }

  function saveManual() {
    var name = document.getElementById('add-name').value.trim();
    var code = document.getElementById('add-code').value.trim();
    var amount = document.getElementById('add-amount').value.trim();
    var date = document.getElementById('add-date').value;
    if (!name || !amount) { alert('名前と金額は必須'); return; }
    api('/arbnb/api/payouts', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'Authorization': authHeader},
      body: JSON.stringify({guest_name: name, reservation_code: code, amount_value: Number(amount), payout_date: date})
    }).then(function(r) { return r.json(); }).then(function() {
      document.getElementById('add-modal').style.display = 'none';
      load();
    }).catch(function(e) { alert('エラー: ' + e.message); });
  }

  function logout() {
    localStorage.removeItem('arbnb_token');
    window.location.href = '/arbnb/login.html';
  }

  window.api = api;
  window.load = load;
  window.render = render;
  window.updateStats = updateStats;
  window.setSort = setSort;
  window.debouncedLoad = debouncedLoad;
  window.openAdd = openAdd;
  window.openScan = openScan;
  window.runScanGuests = runScanGuests;
  window.saveManual = saveManual;
  window.logout = logout;

  document.getElementById('search').addEventListener('input', debouncedLoad);
  document.getElementById('sort').addEventListener('change', load);
  document.getElementById('filter').addEventListener('change', load);

  load();
})();
</script>
</body>
</html>
